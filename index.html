<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-[#1A0B2E] text-white">

    <!-- navbar section -->

    
    <nav class="border-b border-[#412567] w-[full] max-h[92px]">
        <div class="mx-auto px-6 py-4 ">
            <div class="flex items-center justify-between">
                <!-- logo -->
                 <h1 class="text-3xl font-bold">

  Tech<span class="bg-gradient-to-r from-pink-500 to-purple-600 bg-clip-text text-transparent">Wave</span>

                 </h1>

                 <!-- Menu -->

                 <ul class="flex gap-10 text-sm cursor-pointer">
                    <li>About</li>
                    <li>Episodes</li>
                    <li>Host</li>
                 </ul>

                 <!-- Button -->
                  <button class="flex items-center gap-2 px-5 py-2 text-white font-medium text-sm rounded-full bg-gradient-to-r from-[#eab308] via-[#a855f7] to-[#3b82f6] hover:opacity-85 transition-all duration-200 cursor-pointer">
                    <span>Subscribe</span>
                    <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
            </div>
        </div>
    </nav>
</body>
</html>
